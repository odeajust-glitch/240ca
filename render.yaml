services:
  - type: web
    name: collective-agreement-search
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_MODEL_FAST
        value: moonshot-v1-8k
      - key: KIMI_MODEL_SLOW
        value: kimi-k2.6
